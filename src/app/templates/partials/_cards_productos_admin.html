{% for p in productos %}
<div class="col-6 col-md-4 col-lg-3">
    <div class="producto-card h-100 d-flex flex-column p-0">
        <div class="producto-img-wrap">
            {% if p.imagen_url %}
            <img src="{{ p.imagen_url }}" alt="{{ p.nombre }}" class="producto-img" style="object-fit:unset;">
            {% else %}
            <div class="producto-img-placeholder">
                <i class="bi bi-image"></i>
            </div>
            {% endif %}
            <span class="producto-id-float">{{ p.id }}</span>
            <label class="producto-check-label" onclick="event.stopPropagation()">
                <input type="checkbox" class="producto-check" value="{{ p.id }}" />
                <span class="producto-check-box">
                    <i class="bi bi-check2"></i>
                </span>
            </label>
        </div>
        <div class="d-flex flex-column p-3" style="flex:1;">
            <div class="producto-nombre">{{ p.nombre }}</div>
            {% if p.proveedor %}
            <div class="producto-proveedor">
                <i class="bi bi-building me-1"></i>{{ p.proveedor.nombre_empresa or p.proveedor.nombre }}
            </div>
            {% endif %}
            {% if p.descripcion %}
            <div class="producto-desc">{{ p.descripcion }}</div>
            {% endif %}
            <div class="d-flex align-items-center justify-content-between mt-auto pt-2 producto-footer">
                <span class="producto-precio">{{ "%.2f"|format(p.precio) }} €</span>
                <div class="d-flex gap-1">
                    <a href="{{ url_for('router_admin.detalle_producto_cliente', producto_id=p.id) }}"
                        class="btn btn-sm btn-accion" title="Ver detalle">
                        <i class="bi bi-eye"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-accion btn-accion-editar btn-editar-producto"
                        title="Editar producto"
                        data-id="{{ p.id }}"
                        data-nombre="{{ p.nombre | e }}"
                        data-descripcion="{{ (p.descripcion or '') | e }}"
                        data-precio="{{ p.precio }}"
                        data-proveedor="{{ p.proveedor_id }}"
                        data-imagen="{{ (p.imagen_url or '') | e }}"
                        data-url-editar="{{ url_for('router_admin.editar_producto', producto_id=p.id) }}">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button type="button" class="btn btn-sm btn-accion btn-accion-eliminar btn-eliminar-producto"
                        title="Eliminar producto"
                        data-id="{{ p.id }}"
                        data-nombre="{{ p.nombre | e }}"
                        data-url="{{ url_for('router_admin.eliminar_producto', producto_id=p.id) }}">
                        <i class="bi bi-trash3"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endfor %}
