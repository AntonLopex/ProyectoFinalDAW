{% for p in productos %}
<div class="col-6 col-md-4 col-lg-3">
  <div class="producto-card h-100 d-flex flex-column p-0">

    <div class="producto-img-wrap">
      {% if p.imagen_url %}
      <img src="{{ p.imagen_url }}" alt="{{ p.nombre }}" class="producto-img">
      {% else %}
      <div class="producto-img-placeholder">
        <i class="bi bi-image"></i>
      </div>
      {% endif %}
      <span class="producto-id-float">{{ p.id }}</span>
    </div>

    <div class="d-flex flex-column p-3" style="flex:1;">
      <div class="producto-nombre">{{ p.nombre }}</div>
      {% if p.proveedor %}
      <div class="producto-proveedor d-none d-md-block">
        <i class="bi bi-building me-1"></i>{{ p.proveedor.nombre_empresa or p.proveedor.nombre }}
      </div>
      {% endif %}
      {% if p.descripcion %}
      <div class="producto-desc d-none d-md-block">{{ p.descripcion }}</div>
      {% endif %}
      <div style="border-top:1px solid var(--dsg-border); padding-top:0.75rem; margin-top:auto;">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <span class="producto-precio">{{ "%.2f"|format(p.precio|float) }} €</span>
          <a href="{{ url_for('router_cliente.detalle_producto', producto_id=p.id) }}"
            class="btn btn-sm btn-accion" title="Ver detalle">
            <i class="bi bi-eye me-1"></i>Ver
          </a>
        </div>
        <form method="POST" action="{{ url_for('router_cliente.añadir_al_carrito') }}">
          <input type="hidden" name="producto_id" value="{{ p.id }}">
          <input type="hidden" name="cantidad" value="1">
          <button type="submit" class="btn-dsg btn w-100 btn-sm">
            <i class="bi bi-cart-plus me-1"></i> Añadir
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endfor %}
